<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massage Consent Form</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; display: flex; justify-content: center; }
        .paper { background: white; width: 100%; max-width: 800px; padding: 25px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 20px; }
        .title { text-align: center; font-weight: bold; text-decoration: underline; margin-bottom: 20px; }
        .row { margin-bottom: 10px; display: flex; align-items: flex-end; }
        input[type="text"] { border: none; border-bottom: 1px solid #000; flex: 1; outline: none; font-size: 16px; padding: 2px; }
        .section-title { background: #eee; padding: 5px; font-weight: bold; margin: 15px 0; }
        .signature-wrapper { border: 2px dashed #ccc; position: relative; width: 100%; height: 200px; touch-action: none; margin-top: 10px; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        .clear-btn { position: absolute; top: 5px; right: 5px; padding: 5px 10px; z-index: 10; }
        .btn-print { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #000; color: #fff; border-radius: 50px; border: none; font-weight: bold; }
        @media print { .btn-print, .clear-btn { display: none; } }
    </style>
</head>
<body>
<div class="paper">
    <div class="logo"><img src="logo.png" style="max-width:180px;"></div>
    <div class="title">MASSAGE THERAPY CONSENT FORM</div>
    <div class="row">NAME:<input type="text"></div>
    <div class="row">DATE:<input type="text"></div>
    
    <div class="section-title">PREFERENCES & HEALTH</div>
    <p>Pressure: [ ] Soft [ ] Medium [ ] Deep Tissue</p>
    <p>Focus Areas: Neck, Shoulders, Back, Legs, Other: ________________</p>
    <p>Please check if you have: [ ] High Blood Pressure [ ] Pregnancy [ ] Recent Surgery [ ] Allergies</p>

    <div class="section-title">SIGNATURE</div>
    <div class="signature-wrapper">
        <button class="clear-btn" id="clear">Clear</button>
        <canvas id="canvas"></canvas>
    </div>
</div>
<button class="btn-print" onclick="window.print()">SAVE / PRINT</button>

<script>
    const canvas = document.getElementById('canvas');
    const signaturePad = new SignaturePad(canvas);
    function resize() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.onload = resize;
    window.onresize = resize;
    document.getElementById('clear').onclick = () => signaturePad.clear();
</script>
</body>
</html>
